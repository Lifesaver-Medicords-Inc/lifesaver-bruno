info:
  name: get_profile
  type: http
  seq: 1

http:
  method: GET
  url: http://{{host}}:{{port}}/LSMI/api/doctor/profile
  headers:
    - name: Authorization
      value: Basic YWRtaW46YWRtaW4=
    - name: Content-Type
      value: application/json
    - name: Accept
      value: "*/*"
    - name: Accept-Encoding
      value: gzip, deflate, br
    - name: Connection
      value: keep-alive
    - name: Cache-Control
      value: no-cache
    - name: Cookie
      value: "{{cookie}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
